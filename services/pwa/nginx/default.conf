# Configuration Nginx de la PWA (image non-root : écoute sur 8080).
server {
    listen       8080;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Compression des actifs texte.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Service worker, manifeste de version et config runtime : jamais mis en cache
    # (mise à jour immédiate à chaque déploiement).
    location = /ngsw-worker.js { add_header Cache-Control "no-cache"; }
    location = /ngsw.json      { add_header Cache-Control "no-cache"; }
    location = /config.json    { add_header Cache-Control "no-cache"; }
    location = /index.html     { add_header Cache-Control "no-cache"; }

    # Actifs au nom haché (output hashing) : cache long et immuable.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fallback SPA : toute autre route est servie par index.html (routage Angular).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
