# Ingress (chemin « production ») — OPTIONNEL.
#
# Expose la PWA et l'API derrière une seule entrée HTTP même origine :
#   /              → pwa:8080
#   /api-backend/* → api-service:8000   (préfixe réécrit en /*)
#
# ⚠️ Nécessite un ingress controller (ex. ingress-nginx) installé dans le cluster.
# kind n'en fournit pas par défaut — non inclus dans kustomization.yaml pour ne pas
# rompre `make k8s-up` (qui utilise les NodePort). Pour l'activer :
#   1. installer ingress-nginx ;
#   2. décommenter 90-ingress.yaml dans kustomization.yaml ;
#   3. régler PWA_API_BASE_URL=/api-backend dans le ConfigMap (01-config.yaml).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agri-iot-compose-k8s-cloud
  namespace: agri-iot-compose-k8s-cloud
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api-backend(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-service
                port: { number: 8000 }
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: pwa
                port: { number: 8080 }
