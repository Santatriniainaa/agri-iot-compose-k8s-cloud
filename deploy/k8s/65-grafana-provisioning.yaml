# Provisioning Grafana pour Kubernetes — mêmes fichiers que infra/grafana/ (montés côté compose).
# Généré depuis infra/grafana/provisioning/. Datasource interpole $INFLUX_* (env du pod).
apiVersion: v1
data:
  influxdb.yml: |
    apiVersion: 1

    datasources:
      # Bucket principal : mesures brutes + agrégées temps réel.
      - name: InfluxDB
        uid: agri-iot-compose-k8s-cloud_influx
        type: influxdb
        access: proxy
        url: http://influxdb:8086
        isDefault: true
        jsonData:
          version: Flux
          organization: $INFLUX_ORG
          defaultBucket: $INFLUX_BUCKET
          tlsSkipVerify: true
        secureJsonData:
          token: $INFLUX_TOKEN

      # Bucket downsamplé : moyennes horaires, rétention longue (tendances).
      - name: InfluxDB-downsampled
        uid: agri-iot-compose-k8s-cloud_influx_ds
        type: influxdb
        access: proxy
        url: http://influxdb:8086
        isDefault: false
        jsonData:
          version: Flux
          organization: $INFLUX_ORG
          defaultBucket: ${INFLUX_BUCKET}_downsampled
          tlsSkipVerify: true
        secureJsonData:
          token: $INFLUX_TOKEN
