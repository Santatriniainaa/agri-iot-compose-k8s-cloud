# pwa — application mobile Angular servie par Nginx (non-root, :8080).
# Stateless → scalable (Service + HPA). Exposée via NodePort pour la démo (Ingress en prod).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pwa
  namespace: agri-iot-compose-k8s-cloud
  labels: { app: pwa-agri-iot-compose-k8s-cloud }
spec:
  replicas: 1
  selector:
    matchLabels: { app: pwa-agri-iot-compose-k8s-cloud }
  template:
    metadata:
      labels: { app: pwa-agri-iot-compose-k8s-cloud }
    spec:
      containers:
        - name: pwa
          image: agri-iot-compose-k8s-cloud/pwa:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8080, name: http }
          env:
            # URL de l'API vue depuis le NAVIGATEUR (injectée dans config.json au démarrage).
            - { name: API_BASE_URL, valueFrom: { configMapKeyRef: { name: agri-iot-compose-k8s-cloud-config, key: PWA_API_BASE_URL } } }
          resources:
            requests: { cpu: "25m", memory: "32Mi" }
            limits:   { cpu: "250m", memory: "128Mi" }
          readinessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: pwa
  namespace: agri-iot-compose-k8s-cloud
spec:
  type: NodePort
  selector: { app: pwa-agri-iot-compose-k8s-cloud }
  ports:
    - { name: http, port: 8080, targetPort: 8080, nodePort: 30808 }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pwa
  namespace: agri-iot-compose-k8s-cloud
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pwa
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
