# api-service — API REST FastAPI + ML. Stateless → scalable (Service + HPA).
# Exposé via NodePort pour la démo (Ingress en prod).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: agri-iot-compose-k8s-cloud
  labels: { app: api-service-agri-iot-compose-k8s-cloud }
spec:
  replicas: 1
  selector:
    matchLabels: { app: api-service-agri-iot-compose-k8s-cloud }
  template:
    metadata:
      labels: { app: api-service-agri-iot-compose-k8s-cloud }
    spec:
      containers:
        - name: api-service
          image: agri-iot-compose-k8s-cloud/api-service:2026-06-17
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8000, name: http }
          env:
            - { name: INFLUX_URL,    valueFrom: { configMapKeyRef: { name: agri-iot-compose-k8s-cloud-config, key: INFLUX_URL } } }
            - { name: INFLUX_ORG,    valueFrom: { configMapKeyRef: { name: agri-iot-compose-k8s-cloud-config, key: INFLUX_ORG } } }
            - { name: INFLUX_BUCKET, valueFrom: { configMapKeyRef: { name: agri-iot-compose-k8s-cloud-config, key: INFLUX_BUCKET } } }
            - { name: MQTT_HOST,     valueFrom: { configMapKeyRef: { name: agri-iot-compose-k8s-cloud-config, key: MQTT_HOST } } }
            - { name: MQTT_PORT,     valueFrom: { configMapKeyRef: { name: agri-iot-compose-k8s-cloud-config, key: MQTT_PORT } } }
            - { name: CORS_ORIGINS,      valueFrom: { configMapKeyRef: { name: agri-iot-compose-k8s-cloud-config, key: CORS_ORIGINS } } }
            - { name: API_AUTH_USER,     valueFrom: { configMapKeyRef: { name: agri-iot-compose-k8s-cloud-config, key: API_AUTH_USER } } }
            - { name: JWT_ALGORITHM,     valueFrom: { configMapKeyRef: { name: agri-iot-compose-k8s-cloud-config, key: JWT_ALGORITHM } } }
            - { name: JWT_EXPIRE_MINUTES, valueFrom: { configMapKeyRef: { name: agri-iot-compose-k8s-cloud-config, key: JWT_EXPIRE_MINUTES } } }
            - { name: INFLUX_TOKEN,  valueFrom: { secretKeyRef:    { name: agri-iot-compose-k8s-cloud-secret, key: INFLUX_TOKEN } } }
            - { name: MQTT_USERNAME, valueFrom: { secretKeyRef:    { name: agri-iot-compose-k8s-cloud-secret, key: MQTT_USERNAME } } }
            - { name: MQTT_PASSWORD, valueFrom: { secretKeyRef:    { name: agri-iot-compose-k8s-cloud-secret, key: MQTT_PASSWORD } } }
            - { name: API_AUTH_PASSWORD, valueFrom: { secretKeyRef:    { name: agri-iot-compose-k8s-cloud-secret, key: API_AUTH_PASSWORD } } }
            - { name: JWT_SECRET,        valueFrom: { secretKeyRef:    { name: agri-iot-compose-k8s-cloud-secret, key: JWT_SECRET } } }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: agri-iot-compose-k8s-cloud
spec:
  type: NodePort
  selector: { app: api-service-agri-iot-compose-k8s-cloud }
  ports:
    - { name: http, port: 8000, targetPort: 8000, nodePort: 30800 }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-service
  namespace: agri-iot-compose-k8s-cloud
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-service
  minReplicas: 1
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
