name: agri-iot-compose-k8s-cloud

# ──────────────────────────────────────────────────────────────────────────
# agri-iot-compose-k8s-cloud — plateforme cloud-native d'irrigation intelligente
# Flux : sensor-simulator → edge-service → Mosquitto → Telegraf → InfluxDB
#                                                              ↘ Grafana / API
# Lancement (depuis agri-iot-compose-k8s-cloud/) :  make up
#   équivaut à : docker compose -f deploy/docker-compose.yml --project-directory . up -d --build
#   (--project-directory . rend les chemins ./services et ./infra relatifs à agri-iot-compose-k8s-cloud/)
# ──────────────────────────────────────────────────────────────────────────

# Rotation des logs (anchor réutilisé par tous les services) : borne l'espace
# disque consommé par les journaux conteneurs (3 fichiers de 10 Mo max).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# Bornes de ressources (lues par `docker compose` v2 hors swarm) : protègent
# l'hôte d'un runaway (OOM), donnent du QoS et une base saine pour scaler.
# reservations = garanties planificateur ; limits = plafond dur.
x-res-tiny: &res-tiny       # publishers/consumers MQTT (edge, simulateur, météo)
  deploy:
    resources:
      limits:       { cpus: "0.50", memory: 192M }
      reservations: { cpus: "0.05", memory: 32M }
x-res-small: &res-small     # broker, telegraf, grafana, pwa
  deploy:
    resources:
      limits:       { cpus: "0.75", memory: 384M }
      reservations: { cpus: "0.10", memory: 64M }
x-res-api: &res-api         # API + ML (numpy/scikit-learn)
  deploy:
    resources:
      limits:       { cpus: "1.50", memory: 1G }
      reservations: { cpus: "0.25", memory: 256M }
x-res-db: &res-db           # InfluxDB (TSDB)
  deploy:
    resources:
      limits:       { cpus: "1.50", memory: 1G }
      reservations: { cpus: "0.25", memory: 256M }

# Durcissement runtime. *nnp : empêche l'escalade de privilèges (images tierces
# qui dropent elles-mêmes leurs privilèges). *hardening : en plus, supprime
# toutes les capabilities Linux (services applicatifs non-root, aucune requise).
x-nnp: &nnp
  security_opt: ["no-new-privileges:true"]
x-hardening: &hardening
  security_opt: ["no-new-privileges:true"]
  cap_drop: ["ALL"]

services:

  # 1) Broker MQTT --------------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: agri-iot-compose-k8s-cloud-mosquitto
    <<: [*res-small, *nnp]
    restart: unless-stopped
    ports:
      - "1883:1883"      # MQTT
      - "9001:9001"      # WebSocket (optionnel)
    environment:
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
    # Génère le fichier passwd (hashé) à partir des identifiants puis lance le broker.
    # rm -f : régénération idempotente (le fichier persiste dans le volume entre
    # redémarrages, et `mosquitto_passwd -c` refuse d'écraser un passwd existant).
    command:
      - sh
      - -c
      - |
        rm -f /mosquitto/data/passwd
        mosquitto_passwd -b -c /mosquitto/data/passwd "$$MQTT_USERNAME" "$$MQTT_PASSWORD"
        chmod 0600 /mosquitto/data/passwd
        # mosquitto démarre en root puis abandonne ses privilèges vers l'utilisateur
        # `mosquitto` : le passwd doit lui appartenir, sinon « Unable to open pwfile ».
        chown mosquitto:mosquitto /mosquitto/data/passwd
        exec mosquitto -c /mosquitto/config/mosquitto.conf
    volumes:
      - ./infra/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
    networks: [frontend, backend]
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -W 3 -h localhost -u \"$$MQTT_USERNAME\" -P \"$$MQTT_PASSWORD\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # 2) Base de données time-series ---------------------------------------
  influxdb:
    image: influxdb:2.7
    container_name: agri-iot-compose-k8s-cloud-influxdb
    <<: [*res-db, *nnp]
    restart: unless-stopped
    ports:
      # Exposé uniquement sur la boucle locale (admin/CLI) : pas d'accès depuis
      # les autres interfaces de l'hôte. Les services le joignent via le réseau backend.
      - "127.0.0.1:8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
      DOCKER_INFLUXDB_INIT_RETENTION: ${INFLUX_RETENTION}      # rétention du bucket brut
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks: [frontend, backend]
    logging: *default-logging
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10

  # 2b) Init one-shot : downsampling (bucket *_downsampled + task Flux horaire).
  #     S'exécute après qu'InfluxDB soit sain, crée les ressources puis s'arrête.
  #     Idempotent : ne recrée pas la task si elle existe déjà (cf. étape 4).
  influx-init:
    image: influxdb:2.7
    container_name: agri-iot-compose-k8s-cloud-influx-init
    <<: *nnp
    restart: "no"
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      INFLUX_HOST: http://influxdb:8086        # lu automatiquement par la CLI influx
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
      INFLUX_DOWNSAMPLE_RETENTION: ${INFLUX_DOWNSAMPLE_RETENTION}
    entrypoint: ["bash", "-c"]
    command:
      - |
        set -e
        DS_BUCKET="$${INFLUX_BUCKET}_downsampled"
        echo "[influx-init] bucket $$DS_BUCKET (rétention $$INFLUX_DOWNSAMPLE_RETENTION)"
        influx bucket create --name "$$DS_BUCKET" --retention "$$INFLUX_DOWNSAMPLE_RETENTION" \
          || echo "[influx-init] bucket déjà présent"
        cat > /tmp/downsample.flux <<EOF
        option task = {name: "downsample_agri_processed_1h", every: 1h, offset: 1m}

        from(bucket: "$$INFLUX_BUCKET")
          |> range(start: -task.every)
          |> filter(fn: (r) => r._measurement == "agri_processed")
          |> aggregateWindow(every: 1h, fn: mean, createEmpty: false)
          |> to(bucket: "$$DS_BUCKET", org: "$$INFLUX_ORG")
        EOF
        if influx task list | grep -q downsample_agri_processed_1h; then
          echo "[influx-init] task déjà présente"
        else
          influx task create --file /tmp/downsample.flux
        fi
        echo "[influx-init] terminé"
    networks: [backend]
    logging: *default-logging

  # 3) Ingestion MQTT → InfluxDB -----------------------------------------
  telegraf:
    image: telegraf:1.30
    container_name: agri-iot-compose-k8s-cloud-telegraf
    <<: [*res-small, *nnp]
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    environment:
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
    volumes:
      - ./infra/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    networks: [backend]
    logging: *default-logging

  # 4) Edge service (filtrage / agrégation / anomalies / décision) -------
  edge-service:
    build: ./services/edge
    image: agri-iot-compose-k8s-cloud/edge-service:${IMAGE_TAG:-2026-06-17}   # tag partagé avec les manifests k8s
    container_name: agri-iot-compose-k8s-cloud-edge
    <<: [*res-tiny, *hardening]
    read_only: true            # rootfs en lecture seule (service sans état)
    tmpfs: ["/tmp"]
    init: true                 # tini : transmission propre de SIGTERM + reaping
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      WINDOW_SECONDS: ${WINDOW_SECONDS}
      MOISTURE_THRESHOLD: ${MOISTURE_THRESHOLD}
      RAIN_SKIP_MM: ${RAIN_SKIP_MM}
    networks: [backend]
    # Liveness sans dépendance externe : vérifie la joignabilité TCP du broker
    # (proxy de santé pour un service MQTT sans port HTTP).
    healthcheck:
      test: ["CMD", "python", "-c", "import socket,os; socket.create_connection((os.environ['MQTT_HOST'], int(os.environ['MQTT_PORT'])), 3)"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging: *default-logging

  # 5) Sensor simulators (capteurs émulés) -------------------------------
  sensor-simulator:
    build: ./services/simulator
    image: agri-iot-compose-k8s-cloud/sensor-simulator:${IMAGE_TAG:-2026-06-17}   # tag partagé avec les manifests k8s
    container_name: agri-iot-compose-k8s-cloud-sensor-simulator
    # NB : container_name fixe → un seul réplica. Pour `make scale N=...`,
    # commenter cette ligne (Docker exige un nom unique par conteneur).
    <<: [*res-tiny, *hardening]
    read_only: true            # rootfs en lecture seule (service sans état)
    tmpfs: ["/tmp"]
    init: true                 # tini : transmission propre de SIGTERM + reaping
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      SITE: ${SITE}
      PARCELS: ${PARCELS}
      PUBLISH_INTERVAL: ${PUBLISH_INTERVAL}
      ANOMALY_PROB: ${ANOMALY_PROB}
    networks: [backend]
    healthcheck:
      test: ["CMD", "python", "-c", "import socket,os; socket.create_connection((os.environ['MQTT_HOST'], int(os.environ['MQTT_PORT'])), 3)"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging: *default-logging

  # 5b) Weather service (API météo Open-Meteo → MQTT) -------------------
  weather-service:
    build: ./services/weather
    image: agri-iot-compose-k8s-cloud/weather-service:${IMAGE_TAG:-2026-06-17}   # tag partagé avec les manifests k8s
    container_name: agri-iot-compose-k8s-cloud-weather
    <<: [*res-tiny, *hardening]
    read_only: true            # rootfs en lecture seule (service sans état)
    tmpfs: ["/tmp"]
    init: true                 # tini : transmission propre de SIGTERM + reaping
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      SITE: ${SITE}
      WEATHER_LAT: ${WEATHER_LAT}
      WEATHER_LON: ${WEATHER_LON}
      WEATHER_POLL_INTERVAL: ${WEATHER_POLL_INTERVAL}
    # frontend : ce service a besoin d'un accès internet (API Open-Meteo) et
    # joint le broker mosquitto (lui aussi sur frontend). Pas sur backend (internal).
    networks: [frontend]
    healthcheck:
      test: ["CMD", "python", "-c", "import socket,os; socket.create_connection((os.environ['MQTT_HOST'], int(os.environ['MQTT_PORT'])), 3)"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging: *default-logging

  # 6) API / ML service (recommandations, prévision de rendement) --------
  api-service:
    build: ./services/api
    image: agri-iot-compose-k8s-cloud/api-service:${IMAGE_TAG:-2026-06-17}   # tag partagé avec les manifests k8s
    container_name: agri-iot-compose-k8s-cloud-api
    <<: [*res-api, *hardening]
    read_only: true            # rootfs en lecture seule…
    tmpfs: ["/tmp"]            # …sauf /tmp (joblib) et le volume modèles ci-dessous
    init: true                 # tini : transmission propre de SIGTERM + reaping
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      # Pas de défaut sensible en dur : ces valeurs DOIVENT venir du .env.
      CORS_ORIGINS: ${CORS_ORIGINS}
      API_AUTH_USER: ${API_AUTH_USER}
      API_AUTH_PASSWORD: ${API_AUTH_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-720}
    # Modèle ML persistant + inscriptible malgré le rootfs en lecture seule
    # (entraîné au 1er démarrage par entrypoint.sh, réutilisé ensuite).
    volumes:
      - api_models:/app/models
    networks: [frontend, backend]
    logging: *default-logging

  # 7) Grafana (visualisation) -------------------------------------------
  grafana:
    image: grafana/grafana:11.1.0
    container_name: agri-iot-compose-k8s-cloud-grafana
    <<: [*res-small, *nnp]
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      # Autorise un rafraîchissement à 1s (défaut Grafana : bridé à 5s).
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: 1s
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks: [frontend, backend]
    logging: *default-logging

  # 8) PWA (application mobile Angular servie par Nginx) -----------------
  pwa:
    build: ./services/pwa
    image: agri-iot-compose-k8s-cloud/pwa:${IMAGE_TAG:-2026-06-17}   # tag partagé avec les manifests k8s
    container_name: agri-iot-compose-k8s-cloud-pwa
    # Pas de read_only : l'entrypoint génère config.json dans le webroot.
    <<: [*res-small, *hardening]
    restart: unless-stopped
    depends_on:
      api-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # URL de l'API vue depuis le NAVIGATEUR (injectée au runtime dans config.json).
      API_BASE_URL: ${PWA_API_BASE_URL:-http://localhost:8000}
    # Override du healthcheck de l'image : 127.0.0.1 (IPv4) car `localhost` résout
    # d'abord en ::1 dans le conteneur, où nginx n'écoute qu'en IPv4.
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks: [frontend]
    logging: *default-logging

# Segmentation réseau :
#  • frontend : services exposés sur l'hôte + accès internet (météo).
#  • backend  : plan de données interne (broker, TSDB, ingestion, edge…).
#    internal:true ⇒ pas de route vers l'extérieur (isolation de la base).
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  mosquitto_data:
  influxdb_data:
  grafana_data:
  api_models:
