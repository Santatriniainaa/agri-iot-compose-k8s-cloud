<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 600" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#455a64"/>
    </marker>
    <style>
      .box  { rx:10; ry:10; stroke-width:2; }
      .t    { fill:#263238; font-size:14px; font-weight:600; text-anchor:middle; }
      .s    { fill:#546e7a; font-size:11px; text-anchor:middle; }
      .lbl  { fill:#37474f; font-size:11px; text-anchor:middle; }
      .lblbg{ fill:#ffffff; opacity:0.85; }
      .edge { stroke:#455a64; stroke-width:1.8; fill:none; marker-end:url(#arrow); }
      .grp  { fill:none; stroke:#b0bec5; stroke-width:1.4; stroke-dasharray:6 5; rx:14; ry:14; }
      .grpt { fill:#90a4ae; font-size:12px; font-weight:700; letter-spacing:1px; }
    </style>
  </defs>

  <rect x="0" y="0" width="940" height="600" fill="#fafafa"/>
  <text x="470" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#1b5e20">🌱 agri-iot-compose-k8s-cloud — architecture cloud-native IoT</text>
  <text x="470" y="55" text-anchor="middle" font-size="12.5" fill="#607d8b">capteurs → edge → MQTT → stockage time-series → visualisation &amp; ML</text>

  <!-- Zones -->
  <rect class="grp" x="20" y="80" width="200" height="500"/>
  <text class="grpt" x="120" y="100" text-anchor="middle">TERRAIN</text>
  <rect class="grp" x="245" y="80" width="675" height="500"/>
  <text class="grpt" x="582" y="100" text-anchor="middle">CLOUD</text>

  <!-- ============ Flèches (sous les boîtes) ============ -->
  <!-- simulateur -> mosquitto -->
  <path class="edge" d="M180,300 H358"/>
  <rect class="lblbg" x="232" y="282" width="74" height="15"/>
  <text class="lbl" x="269" y="294">raw/+ (QoS 1)</text>

  <!-- mosquitto -> edge (sub raw) -->
  <path class="edge" d="M420,262 V196"/>
  <rect class="lblbg" x="388" y="202" width="40" height="15"/>
  <text class="lbl" x="408" y="214">raw/+</text>
  <!-- edge -> mosquitto (pub processed/alerts) -->
  <path class="edge" d="M460,196 V260"/>
  <rect class="lblbg" x="455" y="202" width="106" height="15"/>
  <text class="lbl" x="508" y="214">processed / alerts</text>

  <!-- mosquitto -> telegraf -->
  <path class="edge" d="M484,286 L698,166"/>
  <rect class="lblbg" x="585" y="214" width="118" height="15"/>
  <text class="lbl" x="644" y="226">processed ($share)</text>

  <!-- telegraf -> influxdb -->
  <path class="edge" d="M800,196 V252"/>
  <rect class="lblbg" x="788" y="217" width="38" height="15"/>
  <text class="lbl" x="807" y="229">write</text>

  <!-- influxdb -> grafana -->
  <path class="edge" d="M800,332 V392"/>
  <rect class="lblbg" x="786" y="355" width="42" height="15"/>
  <text class="lbl" x="807" y="367">query</text>

  <!-- mosquitto -> api (alerts) -->
  <path class="edge" d="M440,335 V452"/>
  <rect class="lblbg" x="445" y="386" width="98" height="15"/>
  <text class="lbl" x="494" y="398">alerts ($share)</text>

  <!-- api -> influxdb (query) -->
  <path class="edge" d="M560,474 L698,324"/>
  <rect class="lblbg" x="612" y="388" width="42" height="15"/>
  <text class="lbl" x="633" y="400">query</text>

  <!-- ============ Boîtes ============ -->
  <!-- sensor-simulator -->
  <rect class="box" x="35" y="255" width="150" height="90" fill="#e8f5e9" stroke="#43a047"/>
  <text class="t" x="110" y="284">sensor-simulator</text>
  <text class="s" x="110" y="302">capteurs émulés (Python)</text>
  <text class="s" x="110" y="318">soil_moisture · temp</text>
  <text class="s" x="110" y="332">rainfall · soil_ph</text>

  <!-- edge-service -->
  <rect class="box" x="320" y="108" width="240" height="86" fill="#e0f2f1" stroke="#00897b"/>
  <text class="t" x="440" y="136">edge-service</text>
  <text class="s" x="440" y="154">filtrage · agrégation · anomalies</text>
  <text class="s" x="440" y="170">décision irrigation · store-and-forward</text>

  <!-- mosquitto -->
  <rect class="box" x="358" y="262" width="124" height="76" fill="#f3e5f5" stroke="#8e24aa"/>
  <text class="t" x="420" y="293">Mosquitto</text>
  <text class="s" x="420" y="311">broker MQTT</text>
  <text class="s" x="420" y="325">(pub / sub)</text>

  <!-- telegraf -->
  <rect class="box" x="700" y="120" width="200" height="76" fill="#e3f2fd" stroke="#1e88e5"/>
  <text class="t" x="800" y="151">Telegraf</text>
  <text class="s" x="800" y="169">ingestion MQTT</text>
  <text class="s" x="800" y="183">→ InfluxDB</text>

  <!-- influxdb -->
  <rect class="box" x="700" y="256" width="200" height="76" fill="#e0f7fa" stroke="#00acc1"/>
  <text class="t" x="800" y="287">InfluxDB</text>
  <text class="s" x="800" y="305">base time-series</text>
  <text class="s" x="800" y="319">agri_raw · agri_processed</text>

  <!-- grafana -->
  <rect class="box" x="700" y="396" width="200" height="76" fill="#fff3e0" stroke="#fb8c00"/>
  <text class="t" x="800" y="427">Grafana</text>
  <text class="s" x="800" y="445">dashboards temps réel</text>
  <text class="s" x="800" y="459">+ alerting</text>

  <!-- api-service -->
  <rect class="box" x="320" y="456" width="240" height="90" fill="#fff8e1" stroke="#f9a825"/>
  <text class="t" x="440" y="484">api-service (FastAPI + ML)</text>
  <text class="s" x="440" y="502">API REST · recommandation irrigation</text>
  <text class="s" x="440" y="518">prévision de rendement (ML) · alertes</text>
  <text class="s" x="440" y="534">http://localhost:8000/docs</text>

  <text x="470" y="592" text-anchor="middle" font-size="10.5" fill="#90a4ae">100 % logiciel et conteneurisé — orchestré par docker compose / Kubernetes (HPA)</text>
</svg>
