# Telegraf — ingestion MQTT → InfluxDB pour agri-iot-compose-k8s-cloud.

[agent]
  interval = "5s"
  flush_interval = "5s"
  omit_hostname = true

# Mesures agrégées (edge-service). La shared subscription $share/<groupe>/...
# répartit la charge si Telegraf est répliqué (pas de double ingestion).
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["$share/telegraf-processed/agri/+/+/processed"]
  qos = 1
  client_id = "telegraf-processed"
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  data_format = "json"
  json_time_key = "ts"
  json_time_format = "2006-01-02T15:04:05Z07:00"
  tag_keys = ["site", "parcel"]
  name_override = "agri_processed"

# Mesures brutes des capteurs (haute fréquence).
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["$share/telegraf-raw/agri/+/+/raw/+"]
  qos = 1
  client_id = "telegraf-raw"
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  data_format = "json"
  json_time_key = "ts"
  json_time_format = "2006-01-02T15:04:05Z07:00"
  tag_keys = ["site", "parcel", "type", "sensor_id"]
  name_override = "agri_raw"

# Conditions météo du site (weather-service → API Open-Meteo). Topic au niveau
# site (pas parcelle). Le tag `source` distingue open-meteo / synthetic (fallback).
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["$share/telegraf-weather/agri/+/meteo"]
  qos = 1
  client_id = "telegraf-weather"
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  data_format = "json"
  json_time_key = "ts"
  json_time_format = "2006-01-02T15:04:05Z07:00"
  tag_keys = ["site", "source"]
  name_override = "agri_weather"

# Sortie InfluxDB v2.
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket = "${INFLUX_BUCKET}"
