# Mosquitto — broker MQTT agri-iot-compose-k8s-cloud (développement)
listener 1883
protocol mqtt

# WebSocket (clients navigateur)
listener 9001
protocol websockets

# Auth login/mot de passe : fichier passwd généré au démarrage depuis
# MQTT_USERNAME / MQTT_PASSWORD. Prod : ajouter TLS/mTLS.
allow_anonymous false
password_file /mosquitto/data/passwd

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
